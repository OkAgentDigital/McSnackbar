name: Snackbar
options:
  bundleIdPrefix: com.udos
  deploymentTarget:
    macOS: 12.0

settings:
  base:
    SWIFT_VERSION: 5.7
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Snackbar:
    type: application
    platform: macOS
    sources:
      - path: Sources
        name: Core
        type: group
      - path: Sources/macOS
        name: macOS
        type: group
      - path: Resources
        name: Resources
        type: group
    settings:
      base:
        PRODUCT_NAME: Snackbar
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Resources/Snackbar.entitlements
    dependencies:
      - target: SnackbarCore
      - framework: AppIntents.framework

  SnackbarCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Core
        name: Core
        type: group
    settings:
      base:
        PRODUCT_NAME: SnackbarCore

  SnackbarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        name: Tests
        type: group
    dependencies:
      - target: Snackbar
      - target: SnackbarCore
