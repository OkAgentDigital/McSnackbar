name: Release Snackbar
on:
  push:
    tags:
      - 'snackbar-*'
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Snackbar
        run: |
          xcodebuild build -project Snackbar.xcodeproj -scheme Snackbar -configuration Release -derivedDataPath .build
      - name: Create DMG
        run: |
          APP_PATH=$(find .build -name "Snackbar.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Snackbar.app not found"
            exit 1
          fi
          hdiutil create -volname "Snackbar Installer" -srcfolder "$APP_PATH" -ov -format UDZO Snackbar.dmg
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: Snackbar.dmg
          generate_release_notes: true
