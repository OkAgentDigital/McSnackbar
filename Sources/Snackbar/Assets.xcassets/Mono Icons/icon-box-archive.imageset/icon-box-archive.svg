<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
  <!-- Lid (top rectangle, full width) -->
  <rect x="3" y="3" width="18" height="8" rx="1" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
  <!-- Body (bottom rectangle, slightly narrower) -->
  <rect x="5" y="10" width="14" height="10" rx="1" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
  <!-- Tab / handle on lid -->
  <rect x="9" y="8" width="6" height="3" rx="1" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
</svg>
